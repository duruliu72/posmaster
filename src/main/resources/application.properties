spring.application.name=posmaster
server.port=8080
# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:30333/posmaster_db
spring.datasource.username=postgres
spring.datasource.password=112233
# Optional (but recommended)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

#Trun off the Spring Boot banner
spring.main.banner-mode=off

spring.jwt.secret=${JWT_SECRET}
#1d=86400
spring.jwt.accessTokenExpiration=86400
#7d
spring.jwt.refreshTokenExpiration=604800

#For File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=public/
spring.datasource.hikari.auto-commit=false
#For Barcode GS1 Prefix
gs1-prefix=789012

#sms Configuration
spring.utility.smsNetbdApiKey=${SMS_NET_BD_API_KEY}


spring.utility.googleClientId=${googleClientId}
spring.utility.googleClientSecret=${googleClientSecret}# This email SENDS the OTP

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.debug=true

spring.utility.emailUsername=${EMAIL_USERNAME}
spring.utility.emailPassword=${EMAIL_PASSWORD}

spring.utility.googleApiKey=${googleApiKey}

